<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Logo Shape Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />   <!-- Sky Blue -->
      <stop offset="50%" stop-color="#3b82f6" />  <!-- Blue -->
      <stop offset="100%" stop-color="#6366f1" /> <!-- Indigo -->
    </linearGradient>

    <!-- Inner Glow / Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Smooth Rounded Background (Glassmorphic Outer Ring) -->
  <rect x="24" y="24" width="464" height="464" rx="128" fill="url(#bgGrad)" stroke="#38bdf8" stroke-width="8" stroke-opacity="0.4" />

  <!-- Inner Soft Accent Ring -->
  <rect x="40" y="40" width="432" height="432" rx="112" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.1" />

  <!-- Stylized Geometric Logo in the Center (Combining "M" and Fedora Infinity/F curves) -->
  <g filter="url(#glow)">
    <path d="M 160 360 
             L 160 170 
             C 160 140, 200 140, 220 170 
             L 256 230 
             L 292 170 
             C 312 140, 352 140, 352 170 
             L 352 360 
             A 20 20 0 0 1 312 360 
             L 312 210 
             L 272 275 
             C 264 288, 248 288, 240 275 
             L 200 210 
             L 200 360 
             A 20 20 0 0 1 160 360 Z" 
          fill="url(#logoGrad)" />
    
    <!-- Floating Orbit / Accent Dot -->
    <circle cx="256" cy="350" r="28" fill="#38bdf8" />
  </g>
</svg>